<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>33/11kV Substation - SCADA View</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#0b0f14;
  color:#fff;
}

/* TOP BAR */
.top{
  height:60px;
  background:#111827;
  display:flex;
  align-items:center;
  padding:0 20px;
  border-bottom:1px solid #1f2937;
}
.top h2{margin:0;font-size:18px;}
.live{margin-left:auto;color:#22c55e}

/* MAIN */
.container{
  display:flex;
  height:calc(100vh - 60px);
}

/* LEFT PANEL */
.left{
  width:260px;
  background:#111827;
  border-right:1px solid #1f2937;
  padding:15px;
}

.card{
  background:#1f2937;
  padding:12px;
  border-radius:10px;
  margin-bottom:12px;
}

.card h4{margin:0;font-size:13px;color:#9ca3af;}
.card b{font-size:18px}

/* RIGHT PANEL */
.right{
  width:280px;
  background:#111827;
  border-left:1px solid #1f2937;
  padding:15px;
}

/* CENTER VIEW */
.center{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* SUBSTATION BOX */
.ss{
  width:600px;
  height:400px;
  background:#1f2937;
  border:2px solid #374151;
  position:relative;
}

/* EQUIPMENT */
.eq{
  position:absolute;
  padding:10px;
  background:#374151;
  border-radius:8px;
  cursor:pointer;
  text-align:center;
  font-size:12px;
}

.ptr{background:#16a34a;}
.cb{background:#3b82f6;}
.bus{background:#f59e0b;}
.cap{background:#06b6d4;}

.eq:hover{
  transform:scale(1.1);
}

/* POPUP */
.popup{
  position:absolute;
  background:#111827;
  border:1px solid #374151;
  padding:10px;
  border-radius:8px;
  display:none;
}
</style>
</head>

<body>

<div class="top">
  <h2>33/11kV Golconda SS</h2>
  <div class="live">● LIVE</div>
</div>

<div class="container">

<!-- LEFT -->
<div class="left">
  <div class="card">
    <h4>PTR-1 Load</h4>
    <b>87%</b>
  </div>
  <div class="card">
    <h4>PTR-2 Load</h4>
    <b>64%</b>
  </div>
  <div class="card">
    <h4>Active Alarms</h4>
    <b style="color:red">2</b>
  </div>
</div>

<!-- CENTER -->
<div class="center">

<div class="ss">

  <!-- PTR -->
  <div class="eq ptr" style="left:80px;top:150px;" onclick="show('PTR-1','Load:87%')">PTR-1</div>
  <div class="eq ptr" style="left:80px;top:60px;" onclick="show('PTR-2','Load:64%')">PTR-2</div>

  <!-- BUS -->
  <div class="eq bus" style="left:250px;top:40px;">33kV Bus</div>
  <div class="eq bus" style="left:250px;top:250px;">11kV Bus</div>

  <!-- BREAKERS -->
  <div class="eq cb" style="left:250px;top:120px;" onclick="show('CB-1','Closed')">CB-1</div>
  <div class="eq cb" style="left:350px;top:120px;" onclick="show('CB-2','Closed')">CB-2</div>

  <!-- CAPACITOR -->
  <div class="eq cap" style="left:450px;top:80px;" onclick="show('Cap Bank','6.6kVAR')">Cap</div>

</div>

<div class="popup" id="popup"></div>

</div>

<!-- RIGHT -->
<div class="right">
  <div class="card">
    <h4>Feeder-1</h4>
    <b>3.6 MW</b>
  </div>
  <div class="card">
    <h4>Feeder-2</h4>
    <b>2.8 MW</b>
  </div>
</div>

</div>

<script>
function show(name,data){
  let p=document.getElementById("popup");
  p.style.display="block";
  p.style.left=event.pageX+"px";
  p.style.top=event.pageY+"px";
  p.innerHTML="<b>"+name+"</b><br>"+data;
}
</script>

</body>
</html>
