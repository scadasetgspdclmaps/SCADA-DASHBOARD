<!-- ═══════════════════════════════════════════════════════════════════
     TGSPDCL — BREAKDOWN ENTRY ENHANCEMENT PATCH (03-Jun-2026)
     Paste this entire block just BEFORE </body> in Breakdown_Entry.html.
     Adds, without breaking existing functionality:
       1. Fetches master data (PTRs + topology) from Firebase on load
          → so future changes via Firebase Console flow into the form
       2. Replaces hardcoded SOURCES_MAP with live Firebase topology data
       3. Shows an "ALTERNATE SOURCES AVAILABLE" panel with live status
          (live / breakdown / idle) per alternate
       4. Shows PTR info (count + total MVA) for the selected SS
       5. On submit, writes the breakdown to Firebase
          /breakdowns/<id> AND flips /feeders/<safekey>/status
       6. Subscribes to /feeders/* SSE so the alternates panel updates
          in real time as other operators flip statuses
       7. Mark-Restored button on each log row
     ═══════════════════════════════════════════════════════════════════ -->
<style>
  /* ALTERNATE SOURCES PANEL */
  .alt-panel {
    margin: 18px 0;
    background: #fff;
    border: 2px solid #fbbf24;
    border-radius: 12px;
    padding: 18px 20px;
    box-shadow: 0 2px 8px rgba(251,191,36,.15);
    display: none;
  }
  .alt-panel.active { display: block; }
  .alt-panel h3 {
    font-size: 11px; letter-spacing: 1.5px; color: #b45309;
    margin-bottom: 14px; text-transform: uppercase; font-weight: 800;
    display: flex; align-items: center; gap: 8px;
  }
  .alt-panel h3 .count-pill {
    background: #fbbf24; color: #7c2d12;
    font-size: 10px; padding: 2px 9px; border-radius: 10px; font-weight: 800;
  }
  .alt-row {
    display: grid; grid-template-columns: 28px 1fr 90px 60px 90px;
    gap: 10px; align-items: center; padding: 8px 0;
    border-bottom: 1px solid #f1f5f9;
    font-size: 12px;
  }
  .alt-row:last-child { border: none; }
  .alt-num {
    background: #f1f5f9; color: #475569; text-align: center;
    border-radius: 4px; font-weight: 700; padding: 4px 0; font-size: 10px;
  }
  .alt-name { color: #1e293b; font-weight: 600; word-break: break-word; }
  .alt-status {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 10px;
    font-size: 10px; letter-spacing: .8px; font-weight: 700;
    justify-content: center; text-transform: uppercase;
  }
  .alt-status.live      { background: #d1fae5; color: #047857; }
  .alt-status.breakdown { background: #fee2e2; color: #b91c1c; }
  .alt-status.idle      { background: #f1f5f9; color: #475569; }
  .alt-status::before { content: '●'; }
  .alt-tag {
    font-size: 9px; padding: 2px 6px; border-radius: 4px;
    background: #dbeafe; color: #1d4ed8; font-weight: 700;
    letter-spacing: .5px; text-align: center;
  }
  .alt-tag.regular { background: #d1fae5; color: #047857; }
  .alt-action {
    background: #1d4ed8; color: #fff; border: none;
    padding: 5px 10px; border-radius: 5px;
    font-size: 9.5px; font-weight: 700; cursor: pointer;
    letter-spacing: .5px;
  }
  .alt-action:hover { background: #1e3a8a; }
  .alt-action:disabled { background: #cbd5e1; cursor: not-allowed; }
  .alt-empty {
    text-align: center; padding: 18px;
    color: #94a3b8; font-style: italic; font-size: 12px;
  }

  /* PTR INFO STRIP */
  .ptr-strip {
    display: none;
    margin-top: 10px;
    padding: 10px 14px;
    background: linear-gradient(90deg, #f0f9ff, #ecfeff);
    border: 1px solid #06b6d4;
    border-radius: 8px;
    font-size: 11px;
    color: #155e75;
    letter-spacing: .3px;
  }
  .ptr-strip.active { display: block; }
  .ptr-strip strong { color: #0891b2; font-weight: 800; }
  .ptr-strip .sep { color: #94a3b8; margin: 0 8px; }

  /* SYNC INDICATOR */
  #fbSyncChip {
    display: inline-block;
    background: rgba(148,163,184,.2);
    color: #64748b;
    font-size: 10px; padding: 3px 10px; border-radius: 10px;
    margin-left: 10px; letter-spacing: 1px; font-weight: 700;
    transition: .25s;
  }
  #fbSyncChip.live {
    background: rgba(16,185,129,.15); color: #047857;
  }
  #fbSyncChip.flash {
    background: #00c8ff; color: #fff;
  }
</style>

<script>
(function(){
  // ───────────────────────────────────────────────────────────────
  // CONFIG
  // ───────────────────────────────────────────────────────────────
  const FIREBASE_URL = "https://scadagridmap-default-rtdb.asia-southeast1.firebasedatabase.app";

  function safeFbKey(name){
    return String(name||'').toUpperCase()
      .replace(/[.#$\[\]\/]/g,'_').replace(/\s+/g,'_')
      .replace(/[^A-Z0-9_-]/g,'').substring(0,180) || 'EMPTY';
  }
  const nowISO = () => new Date().toISOString();
  const genId  = () => 'BD_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8);

  // Local cache populated from Firebase
  let MASTER_PTRS       = {};   // safekey → PTR record
  let MASTER_SS_TOPO    = {};   // safekey → {ssName, sourceFeeders:[]}
  let FEEDER_STATUS_NOW = {};   // safekey → "live"|"breakdown"|"idle"

  // ───────────────────────────────────────────────────────────────
  // BOOTSTRAP — fetch master data once on page load
  // ───────────────────────────────────────────────────────────────
  async function bootstrapMasterData(){
    setSyncChip('loading', 'LOADING MASTER…');
    try {
      // Three parallel fetches
      const [ptrs, topo, statuses] = await Promise.all([
        fetch(`${FIREBASE_URL}/masterData/ptrs.json`).then(r => r.ok ? r.json() : null),
        fetch(`${FIREBASE_URL}/masterData/ssTopology.json`).then(r => r.ok ? r.json() : null),
        fetch(`${FIREBASE_URL}/feeders.json`).then(r => r.ok ? r.json() : null),
      ]);
      MASTER_PTRS    = ptrs     || {};
      MASTER_SS_TOPO = topo     || {};
      // Rebuild FEEDER_STATUS_NOW from snapshot
      if (statuses && typeof statuses === 'object'){
        Object.keys(statuses).forEach(k => {
          const s = statuses[k]?.status;
          if (s) FEEDER_STATUS_NOW[k] = s;
        });
      }
      console.log(`[BD-SYNC] Master loaded — ${Object.keys(MASTER_PTRS).length} PTR records, ${Object.keys(MASTER_SS_TOPO).length} SS topology, ${Object.keys(FEEDER_STATUS_NOW).length} active statuses`);
      setSyncChip('live', '☁ SYNCED');
      // Start live SSE
      subscribeFeederStatusLive();
    } catch (err) {
      console.error('[BD-SYNC] Master fetch failed:', err);
      setSyncChip('error', '⚠ NO SYNC');
    }
  }

  // ───────────────────────────────────────────────────────────────
  // LIVE STATUS SUBSCRIPTION (SSE) — flips alternates panel in real time
  // ───────────────────────────────────────────────────────────────
  let _sse = null;
  function subscribeFeederStatusLive(){
    if (!('EventSource' in window)) return;
    if (_sse) { try { _sse.close(); } catch(e){} }
    try {
      const es = new EventSource(`${FIREBASE_URL}/feeders.json`);
      const onEvent = (evt) => {
        try {
          const payload = JSON.parse(evt.data);
          if (!payload || payload.data === null) return;
          const parts = (payload.path || '/').split('/').filter(Boolean);
          if (payload.path === '/' && typeof payload.data === 'object'){
            // Initial snapshot — rebuild
            FEEDER_STATUS_NOW = {};
            Object.keys(payload.data).forEach(k => {
              const s = payload.data[k]?.status;
              if (s) FEEDER_STATUS_NOW[k] = s;
            });
          } else if (parts.length === 1 && typeof payload.data === 'object'){
            FEEDER_STATUS_NOW[parts[0]] = payload.data.status || 'live';
          } else if (parts.length === 2 && parts[1] === 'status'){
            FEEDER_STATUS_NOW[parts[0]] = payload.data || 'live';
          }
          // Refresh visible panel
          refreshAlternatesPanel();
          flashSyncChip();
        } catch(e){ console.warn('[BD-SSE]', e); }
      };
      es.addEventListener('put', onEvent);
      es.addEventListener('patch', onEvent);
      es.addEventListener('error', () => {
        try { es.close(); } catch(_){}
        _sse = null;
        setSyncChip('error', '⟳ RECONNECT…');
        setTimeout(subscribeFeederStatusLive, 5000);
      });
      es.addEventListener('open', () => setSyncChip('live', '☁ SYNCED'));
      _sse = es;
    } catch (err){
      console.warn('[BD-SSE] subscribe failed:', err);
    }
  }

  function setSyncChip(mode, txt){
    const el = document.getElementById('fbSyncChip');
    if (!el) return;
    el.className = mode === 'live' ? 'live' : '';
    el.textContent = txt;
  }
  function flashSyncChip(){
    const el = document.getElementById('fbSyncChip');
    if (!el) return;
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 500);
  }

  // ───────────────────────────────────────────────────────────────
  // CURRENT SELECTED SS — track in module
  // ───────────────────────────────────────────────────────────────
  let _currentSS = null;   // { ssName, ssCode, ptrInfo, sources:[] }

  function getCurrentSelectedSS(){
    // Read from the ss_name dropdown — value is the ss_code
    const sel = document.getElementById('ss_name');
    if (!sel || !sel.value) return null;
    const code = sel.value;
    // Find display name from SS_DATA (defined in the host page)
    const ss = (window.SS_DATA || []).find(s => s.ss_code === code);
    if (!ss) return null;
    return { ssCode: code, ssName: ss.ss_name };
  }

  // Best-effort match: look up topology by SS name (Firebase keys are
  // safeFbKey of full SS name). Try several name variants because
  // ssTopology was indexed by GIS-mapping name which may differ from
  // the SS_DATA dropdown name.
  function findTopologyForSS(ssName){
    if (!ssName) return null;
    const candidates = [
      ssName,
      ssName.replace(/^33\/11\s*KV\s+/i, '33/11KV '),
      ssName.replace(/^33\/11\s*KV\s+/i, ''),
      ssName.replace(/\s+SS$/i, '')
    ];
    for (const c of candidates){
      const k = safeFbKey(c);
      if (MASTER_SS_TOPO[k]) return MASTER_SS_TOPO[k];
    }
    // Fuzzy fallback — match by distinctive word
    const target = ssName.toUpperCase().replace(/[^A-Z0-9 ]/g,'').split(/\s+/)
      .filter(w => w.length >= 5 && !['NAGAR','HILLS','COLONY','PALLY','PURAM'].includes(w));
    if (!target.length) return null;
    for (const k of Object.keys(MASTER_SS_TOPO)){
      const rec = MASTER_SS_TOPO[k];
      const nameUp = (rec.ssName || '').toUpperCase();
      if (target.every(t => nameUp.includes(t))) return rec;
    }
    return null;
  }

  function findPTRForSS(ssCode, ssName){
    // Try by SS code first (most reliable)
    if (ssCode){
      const k = safeFbKey(ssCode);
      if (MASTER_PTRS[k]) return MASTER_PTRS[k];
    }
    // Then by name
    if (ssName){
      const k = safeFbKey(ssName);
      if (MASTER_PTRS[k]) return MASTER_PTRS[k];
      // Scan
      const nUp = ssName.toUpperCase();
      for (const key of Object.keys(MASTER_PTRS)){
        const r = MASTER_PTRS[key];
        if ((r.ssName || '').toUpperCase() === nUp) return r;
        if ((r.ssCode || '') === ssCode) return r;
      }
    }
    return null;
  }

  // ───────────────────────────────────────────────────────────────
  // ALTERNATES PANEL — render
  // ───────────────────────────────────────────────────────────────
  function buildAlternatesPanel(){
    // Insert panel into DOM if not present
    if (document.getElementById('altPanel')) return;
    const panel = document.createElement('div');
    panel.id = 'altPanel';
    panel.className = 'alt-panel';
    panel.innerHTML = `
      <h3>
        🔀 Source Feeders & Alternate Routing
        <span class="count-pill" id="altCntPill">0</span>
      </h3>
      <div id="ptrStrip" class="ptr-strip"></div>
      <div id="altList"></div>
    `;
    // Place after section 1 (Substation Identification card)
    const sec1 = document.querySelector('.form-card, .section, .card');
    if (sec1 && sec1.parentNode) sec1.parentNode.insertBefore(panel, sec1.nextSibling);
    else document.body.insertBefore(panel, document.body.firstChild);
  }

  function refreshAlternatesPanel(){
    const panel = document.getElementById('altPanel');
    if (!panel) return;
    const sel = getCurrentSelectedSS();
    if (!sel){
      panel.classList.remove('active');
      return;
    }
    const topo = findTopologyForSS(sel.ssName);
    const ptr  = findPTRForSS(sel.ssCode, sel.ssName);

    // PTR strip
    const ptrStrip = document.getElementById('ptrStrip');
    if (ptr && ptrStrip){
      ptrStrip.classList.add('active');
      const caps = (ptr.ptrCapacities || []).map(c => c + ' MVA').join(' + ') || '—';
      ptrStrip.innerHTML = `
        🔌 <strong>${ptr.ptrCount || 0} PTR(s)</strong>
        <span class="sep">•</span>
        Capacities: <strong>${caps}</strong>
        <span class="sep">•</span>
        Total: <strong>${ptr.totalCapacityMVA || 0} MVA</strong>
        <span class="sep">•</span>
        Op: <strong>${ptr.opCircle || '—'} → ${ptr.opSubDiv || '—'}</strong>
      `;
    } else if (ptrStrip){
      ptrStrip.classList.remove('active');
      ptrStrip.innerHTML = '';
    }

    // Alternates list
    const list = document.getElementById('altList');
    const cntPill = document.getElementById('altCntPill');
    if (!list) return;

    // Determine "regular" feeder = the one currently picked in feeder_33kv
    const regularField = document.getElementById('feeder_33kv');
    const regularName = (regularField && regularField.value || '').trim();

    // Build alternate list from topology
    let sources = (topo && topo.sourceFeeders) || [];
    if (sources.length === 0){
      panel.classList.add('active');
      list.innerHTML = `<div class="alt-empty">No source-feeder topology found for ${sel.ssName}.<br>Upload GIS data or add manually in Firebase /masterData/ssTopology/.</div>`;
      cntPill.textContent = '0';
      return;
    }

    // Sort: regular first, then by status (live → idle → breakdown)
    const statusOrder = { live:0, idle:1, breakdown:2 };
    sources = [...sources].sort((a,b) => {
      const aReg = regularName && a.feederName.toUpperCase().includes(regularName.slice(0,20).toUpperCase()) ? 0 : 1;
      const bReg = regularName && b.feederName.toUpperCase().includes(regularName.slice(0,20).toUpperCase()) ? 0 : 1;
      if (aReg !== bReg) return aReg - bReg;
      const aS = FEEDER_STATUS_NOW[safeFbKey(a.feederName)] || 'live';
      const bS = FEEDER_STATUS_NOW[safeFbKey(b.feederName)] || 'live';
      return (statusOrder[aS]||1) - (statusOrder[bS]||1);
    });

    cntPill.textContent = sources.length;
    panel.classList.add('active');

    list.innerHTML = sources.map((s, i) => {
      const sk = safeFbKey(s.feederName);
      const status = FEEDER_STATUS_NOW[sk] || 'live';
      const isReg = regularName && s.feederName.toUpperCase().includes(regularName.slice(0,15).toUpperCase());
      const tag = isReg ? '<span class="alt-tag regular">REGULAR</span>' : '<span class="alt-tag">ALT</span>';
      const canSwitch = status === 'live' && !isReg;
      return `
        <div class="alt-row">
          <span class="alt-num">#${i+1}</span>
          <span class="alt-name" title="EHT: ${s.ehtSource||'unknown'} • Code: ${s.feederCode||'—'}">
            ${s.feederName}
          </span>
          ${tag}
          <span class="alt-status ${status}">${status}</span>
          <button class="alt-action"
            ${canSwitch ? '' : 'disabled'}
            onclick="window.bdSwitchToAlternate('${s.feederName.replace(/'/g,"\\'")}')">
            ${canSwitch ? 'USE THIS' : (isReg ? 'CURRENT' : '–')}
          </button>
        </div>`;
    }).join('');
  }

  // Click handler for "USE THIS" — copies the alternate into the alt_source dropdown
  window.bdSwitchToAlternate = function(feederName){
    const alt = document.getElementById('alt_source');
    if (alt){
      // Find or add option
      let matched = false;
      for (let i = 0; i < alt.options.length; i++){
        if (alt.options[i].text === feederName || alt.options[i].value === feederName){
          alt.selectedIndex = i; matched = true; break;
        }
      }
      if (!matched){
        const opt = document.createElement('option');
        opt.value = feederName; opt.textContent = feederName; opt.selected = true;
        alt.appendChild(opt);
      }
    }
    if (typeof window.showToast === 'function') window.showToast(`Alternate selected: ${feederName.substring(0,40)}…`);
  };

  // ───────────────────────────────────────────────────────────────
  // FIREBASE WRITE on form submit
  // ───────────────────────────────────────────────────────────────
  async function writeBreakdownToFirebase(){
    const sel = getCurrentSelectedSS();
    if (!sel){ console.warn('[BD-WRITE] No SS selected'); return null; }
    const feederName = (document.getElementById('feeder_33kv')?.value || '').trim();
    if (!feederName){ console.warn('[BD-WRITE] No feeder name'); return null; }

    const id = genId();
    const now = nowISO();
    const fbk = safeFbKey(feederName);
    const v = (id) => (document.getElementById(id)?.value || '').trim();
    const restoration = v('restoration_time');
    const isOpen = !restoration;
    const newStatus = isOpen ? 'breakdown' : 'live';

    // Detect agency from selected pill
    const agencyPill = document.querySelector('#agency_group .radio-btn.selected, #agency_group .selected, .agency-btn.active');
    // Detect outage type
    const outagePill = document.querySelector('.outage-btn.active, .radio-btn.red.selected, .radio-btn.amber.selected, .radio-btn.green.selected');
    // Detect nature
    const naturePill = document.querySelector('input[name="nature"]:checked');

    const payload = {
      id,
      feederName, feederCode: '',
      substationName:    sel.ssName,
      substationCode:    sel.ssCode,
      division:          v('lines_division'),
      sub_division:      v('sub_division'),
      section:           v('section'),
      ehtSource:         v('name_eht') || v('eht_substation'),
      alternativeSource: v('alt_source'),
      failureDateTime:   v('failure_time') || now,
      agency:            agencyPill ? agencyPill.textContent.trim() : '',
      outageType:        outagePill ? outagePill.textContent.trim() : 'BREAKDOWN',
      operationType:     v('ops_type'),
      relayIndication:   v('relay'),
      identifiedFault:   v('identified_fault'),
      natureOfFault:     naturePill ? naturePill.value : '',
      weatherCondition:  v('weather'),
      personResponsible: v('person_responsible'),
      fpiActed:          v('fpi_location'),
      rootCause:         v('root_cause'),
      restorationDateTime: restoration,
      durationMinutes:   restoration ?
        Math.max(0, Math.round((new Date(restoration) - new Date(v('failure_time')||now))/60000)) : 0,
      rectifiedDateTime: v('rectified_time'),
      rectificationDetails: v('rectification_details'),
      lcTakenFrom:       v('lc_taken_from'),
      lcCompleted:       v('lc_completed'),
      additionalRemarks: v('remarks'),
      enteredBy:         '',
      enteredAt:         now,
      updatedAt:         now,
      isOpen
    };
    try {
      // 1. Write the breakdown record
      await fetch(`${FIREBASE_URL}/breakdowns/${id}.json`, {
        method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify(payload)
      });
      // 2. Flip the feeder status
      await fetch(`${FIREBASE_URL}/feeders/${fbk}.json`, {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          status: newStatus, lastUpdated: now,
          lastBreakdownId: id, feederName
        })
      });
      console.log(`[BD-WRITE] ✓ ${id} — ${feederName} → ${newStatus.toUpperCase()}`);
      flashSyncChip();
      return { ok: true, id, status: newStatus };
    } catch (err){
      console.error('[BD-WRITE] Failed:', err);
      return { ok: false, error: err.message };
    }
  }

  // ───────────────────────────────────────────────────────────────
  // HOOK INTO EXISTING FORM HANDLERS
  // ───────────────────────────────────────────────────────────────
  function installHooks(){
    // 1. After onSSChange, refresh alternates panel
    if (typeof window.onSSChange === 'function'){
      const origOnSS = window.onSSChange;
      window.onSSChange = function(){
        try { origOnSS.apply(this, arguments); } catch(e){ console.error(e); }
        setTimeout(refreshAlternatesPanel, 50);   // wait for original to finish
      };
    }
    // 2. After logBreakdown, also write to Firebase
    if (typeof window.logBreakdown === 'function'){
      const origLog = window.logBreakdown;
      window.logBreakdown = async function(){
        // Call original first (it does the validation + local session log)
        let result;
        try { result = origLog.apply(this, arguments); } catch(e){ console.error(e); }
        // Then push to Firebase
        const fbResult = await writeBreakdownToFirebase();
        if (fbResult && fbResult.ok){
          if (typeof window.showToast === 'function')
            window.showToast(`☁ Synced to cloud — ${fbResult.id}`);
        } else if (fbResult && !fbResult.ok){
          alert('Could not sync to cloud: ' + (fbResult.error || 'unknown'));
        }
        return result;
      };
    }
  }

  // ───────────────────────────────────────────────────────────────
  // SYNC CHIP — inject into header
  // ───────────────────────────────────────────────────────────────
  function injectSyncChip(){
    if (document.getElementById('fbSyncChip')) return;
    const chip = document.createElement('span');
    chip.id = 'fbSyncChip';
    chip.textContent = '☁ INIT…';
    // Find a header
    const target = document.querySelector('.live-chip, .header-title, h1, .page-title');
    if (target && target.parentNode){
      target.parentNode.insertBefore(chip, target.nextSibling);
    } else {
      // Fallback: top of body
      chip.style.position = 'fixed';
      chip.style.top = '12px';
      chip.style.right = '12px';
      chip.style.zIndex = '9999';
      document.body.appendChild(chip);
    }
  }

  // ───────────────────────────────────────────────────────────────
  // INIT
  // ───────────────────────────────────────────────────────────────
  function init(){
    injectSyncChip();
    buildAlternatesPanel();
    installHooks();
    bootstrapMasterData();
  }
  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  // Expose for debugging
  window.bdSync = {
    refresh: refreshAlternatesPanel,
    rebootstrap: bootstrapMasterData,
    masterPTRs: () => MASTER_PTRS,
    masterTopo: () => MASTER_SS_TOPO,
    statuses: () => FEEDER_STATUS_NOW,
    writeBreakdown: writeBreakdownToFirebase
  };
})();
</script>
